version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: campusgpt_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: campusgpt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 5s

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/Dockerfile.backend
    container_name: campusgpt_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/campusgpt
      - CORS_ORIGINS=["http://localhost", "http://127.0.0.1", "http://localhost:5173"]
      - LOG_LEVEL=info
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: campusgpt_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
